<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080c12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LifeStock">
  <meta name="description" content="防災・備蓄管理アプリ LifeStock — もしもの時に、物と健康を迷わず守る">
  <title>LifeStock — 防災・備蓄管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    /* Scan buttons */
    .scan-btn-primary {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      padding:12px 8px; border-radius:10px; cursor:pointer;
      background:var(--blue-dim); border:1px solid rgba(77,166,255,.35);
      color:var(--blue); font-family:var(--font-body); transition:all .15s;
    }
    .scan-btn-primary:active { transform:scale(.97); }
    .scan-btn-ai {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      padding:12px 8px; border-radius:10px; cursor:pointer;
      background:var(--green-dim); border:1px solid var(--green-border);
      color:var(--green); font-family:var(--font-body); transition:all .15s;
    }
    .scan-btn-ai:active { transform:scale(.97); }
    .scan-btn-sub {
      padding:9px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600;
      background:var(--bg-3); border:1px solid var(--border-med); color:var(--txt-2);
      font-family:var(--font-body); transition:all .15s;
    }
    .scan-btn-sub:active { background:var(--bg-hover); }
  </style>
</head>
<body>

<div id="app">
  <header id="app-header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
          <path d="M16 2L4 8v8c0 7.2 5.2 13.9 12 15.5C23.8 29.9 28 23.2 28 16V8L16 2z" fill="var(--red)" opacity="0.9"/>
          <path d="M13 16l2.5 2.5L20 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">LifeStock</span>
      </div>
      <div class="header-right">
        <button id="emergency-btn" class="emergency-btn" onclick="App.showEmergencyCard()">
          <span>🆘</span> 緊急カード
        </button>
      </div>
    </div>
  </header>

  <main id="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-inventory"  class="page"></div>
    <div id="page-profiles"   class="page"></div>
    <div id="page-shopping"   class="page"></div>
    <div id="page-settings"   class="page"></div>
  </main>

  <nav id="bottom-nav">
    <button class="nav-item active" data-page="dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span class="nav-label">ホーム</span>
    </button>
    <button class="nav-item" data-page="inventory">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
        <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
        <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
      </svg>
      <span class="nav-label">備蓄品</span>
    </button>
    <button class="nav-item nav-center" data-action="add-item">
      <div class="nav-add-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </button>
    <button class="nav-item" data-page="profiles">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">健康カード</span>
    </button>
    <button class="nav-item" data-page="shopping">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.7 13.4a2 2 0 002 1.6h9.7a2 2 0 001.95-1.57l1.65-8.43H6"/>
      </svg>
      <span class="nav-label">買い物</span>
    </button>
  </nav>
</div>

<div id="modal-bg" class="modal-bg hidden" onclick="Modal.closeBg(event)">
  <div id="modal-sheet" class="modal-sheet">
    <div class="modal-drag-bar"></div>
    <div class="modal-header">
      <h2 id="modal-title" class="modal-title"></h2>
      <button class="modal-close-btn" onclick="Modal.close()">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- html5-qrcode は使用時に遅延ロード -->
<div id="__temp_scan__" style="display:none;"></div>

<div id="toast-container"></div>

<!-- QRCode.js（緊急カード用） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
  integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSe2HkjGVMFbO3sAMbFPEECZCM9Pi0Kx4O7g=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<!-- App modules -->
<script src="db.js"></script>
<script src="app.js"></script>
<script src="vision.js"></script>
<script src="barcode.js"></script>
<script src="dashboard.js"></script>
<script src="inventory.js"></script>
<script src="profiles.js"></script>
<script src="shopping.js"></script>
<script src="settings.js"></script>

<script>
  (async () => {
    await DB.init();
    App.init();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  })();
</script>
</body>
</html>
